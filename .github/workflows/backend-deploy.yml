name: Deploy Backend to AWS Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**' # This CRUCIAL line ensures it ONLY runs when files in your backend folder change!

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1 # Change to your actual AWS region

      - name: Package and Deploy to Lambda
        run: |
          cd backend
          zip -r deployment.zip .
          aws lambda update-function-code --function-name Spectra-Leaf-Backend --zip-file fileb://deployment.zip
